# API Configuration

# Server Settings
server:
  host: "0.0.0.0"
  port: 5000
  debug: true
  workers: 4
  
# API Settings
api:
  version: "v1"
  title: "Deepfake Detection API"
  description: "API for detecting AI-generated and manipulated media"
  max_upload_size: 10485760  # 10MB in bytes
  allowed_image_formats:
    - "jpg"
    - "jpeg"
    - "png"
    - "webp"
  allowed_audio_formats:
    - "mp3"
    - "wav"
    - "ogg"
    - "flac"
    
# Model Settings
model:
  image_model_path: "data/models/checkpoints/best_checkpoint.pth"
  audio_model_path: "data/models/audio_detector_best.pth"
  device: "cuda"  # Options: cuda, cpu
  
# Rate Limiting
rate_limiting:
  enabled: true
  requests_per_minute: 60
  requests_per_hour: 1000
  
# CORS Settings
cors:
  enabled: true
  origins:
    - "*"  # In production, specify exact origins
    
# Logging
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/api.log"
  
# Cache Settings
cache:
  enabled: true
  ttl: 3600  # Time to live in seconds
  max_size: 100  # Maximum number of cached results
  
# Security
security:
  api_key_required: false  # Set to true in production
  api_key_header: "X-API-Key"
  
# Response Settings
response:
  include_metadata: true
  include_confidence_breakdown: true
  include_processing_time: true
